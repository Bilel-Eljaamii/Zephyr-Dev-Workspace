name: Zephyr CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: workspace

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler wget \
            python3 python3-venv xz-utils file make \
            gcc gcc-multilib g++-multilib libsdl2-dev \
            build-essential ca-certificates curl
          
      - name: Install uv
        run: |
          id
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Zephyr SDK
        id: cache-zephyr-sdk
        uses: actions/cache@v4
        with:
          path: /opt/zephyr-sdk
          key: zephyr-sdk-0.17.4

      - name: Download Zephyr SDK
        if: steps.cache-zephyr-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_VERSION="0.17.4"
          # Use minimal to save time; ESP32-C6 needs RISC-V
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VERSION}/zephyr-sdk-${SDK_VERSION}_linux-x86_64_minimal.tar.xz
          tar -xJf zephyr-sdk-${SDK_VERSION}_linux-x86_64_minimal.tar.xz -C /opt/
          mv /opt/zephyr-sdk-${SDK_VERSION} /opt/zephyr-sdk
          cd /opt/zephyr-sdk
          # Install RISC-V for ESP32-C6 and Host tools
          ./setup.sh -t riscv64-zephyr-elf -h -c

      - name: Initialize Zephyr Project
        working-directory: workspace
        run: |
          # Create venv and install west
          uv venv .venv --python 3.13
          uv pip install west jsonschema
          
          # Init using Zephyr's official manifest
          uv run west init -m https://github.com/zephyrproject-rtos/zephyr --mr main .
          uv run west update --narrow -o=--depth=1
          uv run west zephyr-export
          
          # Fetch Espressif binary blobs
          # uv run west blobs fetch hal_espressif
          
          # Install requirements
          uv pip install -r zephyr/scripts/requirements.txt

      - name: Build Samples (Verification)
        working-directory: workspace
        env:
          ZEPHYR_SDK_INSTALL_DIR: /opt/zephyr-sdk
          ZEPHYR_TOOLCHAIN_VARIANT: zephyr
        run: |
          # Build for Native Sim
          uv run west build -b native_sim zephyr/samples/hello_world -d build_native
          
          # Build for ESP32-C6
          # uv run west build -b esp32c6_devkitc/esp32c6/hpcore zephyr/samples/hello_world -d build_esp32c6
